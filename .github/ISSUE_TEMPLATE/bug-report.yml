name: Bug report
description: Something did not work as expected.
labels: ["bug", "triage"]
assignees: []
body:
  - type: input
    id: package_version
    attributes:
      label: Package version
      description: Run `composer show -s | head`.
      placeholder: "example: 1.0.0"
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP version
      description: Run `php -v`.
      placeholder: "example: PHP 8.5.4"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: List the smallest set of commands or code needed to reproduce the issue.
    validations:
      required: true
