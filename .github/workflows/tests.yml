name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install php-tools
        run: |
          git clone --depth=1 https://github.com/homebase/php-tools.git /tmp/php-tools
          /tmp/php-tools/php-tools install all

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install GNU parallel
        run: sudo apt-get update && sudo apt-get install -y parallel

      - name: Run Spartan tests
        run: composer test

      - name: Run Pest tests
        run: composer pest
